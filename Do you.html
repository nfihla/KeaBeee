<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Do you miss me?</title>
    <style>
        body {
            /* Blue background styling */
            background-color: #3498db;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        #question {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .buttons {
            position: relative;
            width: 300px;
            height: 100px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 10px 25px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.2s;
        }

        #noBtn {
            position: absolute; /* Needed for random movement */
        }
    </style>
</head>
<body>

    <h1 id="statement">😗I’ve got something to say but first…</h1>
	<h1 id="question">Do you miss me?</h1>
    
    <div class="buttons">
        <button id="yesBtn" onclick="accept()">Yes</button>
        <button id="noBtn" onmouseover="moveButton()">No</button>
    </div>

    <script>
        function accept() {
            document.getElementById('question').innerText = "I miss you more! ❤️";
            document.getElementById('yesBtn').style.display = 'none';
            document.getElementById('noBtn').style.display = 'none';
        }

        function moveButton() {
            const btn = document.getElementById('noBtn');
            // Calculate random positions within the window
            const maxX = window.innerWidth - btn.offsetWidth;
            const maxY = window.innerHeight - btn.offsetHeight;
            
            const newX = Math.random() * maxX;
            const newY = Math.random() * maxY;
            
            btn.style.left = newX + "px";
            btn.style.top = newY + "px";
        }
    </script>
</body>
</html>
